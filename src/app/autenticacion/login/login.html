<div class="login-container">
  <div class="login-card">
    
    <header class="login-header">
      <img src="https://www.brandbucket.com/sites/default/files/logo_uploads/42379/large_sincea1.png" alt="logotipo">
      <h1 class="logo-title">SINCEA</h1>
      <p class="logo-subtitle">Sistema de Navegación del Campus</p>
    </header>

    <form (ngSubmit)="alIngresar()" #loginForm="ngForm" class="login-form">
      <h2 class="form-title">Iniciar Sesión</h2>

      @if (errorMessage) {
        <div class="alert-error">
          {{ errorMessage }}
        </div>
      }

      <div class="form-group">
        <label for="username">Usuario</label>
        <input 
          type="text" 
          id="username" 
          name="username"
          [(ngModel)]="usuario"
          placeholder="Ingresa tu usuario" 
          autocomplete="off">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password"
          [(ngModel)]="contrasena"
          placeholder="Ingresa tu contraseña">
      </div>

      <button type="submit" class="submit-btn">Ingresar</button>
    </form>

    <footer class="login-footer">
      <small>Universidad del Istmo — Campus Tehuantepec</small>
    </footer>

  </div>
</div>
