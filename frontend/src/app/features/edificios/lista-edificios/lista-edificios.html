<main class="lista-edificios">

  <div class="lista-edificios__encabezado">
    <h1>Edificios</h1>
    <p>Selecciona un edificio para ver más información</p>
  </div>

  <hr>

  <div class="lista-edificios__lista">
    @for (edificio of edificios; track edificio.id) {
      <app-tarjeta-edificio [edificio]="edificio" />
    } @empty {
      <p style="text-align: center; width: 100%;">Cargando infraestructura del campus...</p>
    }
  </div>

</main>
