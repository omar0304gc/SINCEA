<div class="contenedor-profesor">


<main class="detalle-profesor" *ngIf="profesor">

  <div class="detalle-profesor__header">
    <button class="detalle-profesor__regresar" (click)="regresar()">
      <app-icono nombre="atras" ancho="22px" alto="22px" />
    </button>
    <h1>Perfiles</h1>
  </div>

  <section class="detalle-profesor__basico">
    <div class="detalle-profesor__foto-contenedor">
      <div class="detalle-profesor__foto">
        <img 
          [src]="profesor.foto || 'images/foto_perfil_predeterminado.jpg'"
          [alt]="profesor.nombre" />
      </div>
    </div>

    <div class="detalle-profesor__campo-nombre">
      <span class="detalle-profesor__valor-nombre">{{ profesor.nombre }}</span>
    </div>
  </section>
  

  <div class="detalle-profesor__info">

    

    <div class="detalle-profesor__campo">
      <span class="detalle-profesor__label">CONTACTO:</span>
      <span class="detalle-profesor__valor">{{ profesor.contacto }}</span>
    </div>

    <div class="detalle-profesor__campo">
      <span class="detalle-profesor__label">CARRERA:</span>
      <span class="detalle-profesor__valor">{{ profesor.departamento }}</span>
    </div>

    <div class="detalle-profesor__campo">
      <span class="detalle-profesor__label">EDIFICIO:</span>
      <span class="detalle-profesor__valor">{{ profesor.edificio }}</span>
    </div>

    <div class="detalle-profesor__campo">
      <span class="detalle-profesor__label">CUBÍCULO:</span>
      <span class="detalle-profesor__valor">{{ profesor.cubiculo }}</span>
    </div>

  </div>

  <button class="detalle-profesor__btn-horario" (click)="verHorario()">
    <app-icono nombre="horario" ancho="30px" alto="30px" />
    <span>VER HORARIO</span>
  </button>

</main>

<!-- Profesor no encontrado -->
<main class="detalle-profesor detalle-profesor--vacio" *ngIf="!profesor">
  <p>Profesor no encontrado.</p>
  <button (click)="regresar()">Regresar</button>
</main>
</div>
