<div class="tarjeta-edificio" (click)="verDetalle()">
  <div class="tarjeta-edificio__imagen">
    <img 
    alt="Fotografía del edificior" 
    title="Edificio"
    [src]="edificio.imagen || 'images/home_edificio.png'"
    [alt]="edificio.nombre" />
  </div>
  <div class="tarjeta-edificio__info">
    <h3>{{ edificio.nombre }}</h3>
  </div>
</div>
