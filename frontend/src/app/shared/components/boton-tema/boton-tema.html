<button 
  type="button"
  class="boton-tema" 
  (click)="alternar()"
  [title]="temaService.estaOscuro() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'" title="Cambiar modo">
  
  <app-icono 
    [nombre]="temaService.estaOscuro() ? 'sol' : 'luna'"
    ancho="22px" 
    alto="22px" />
</button>
